name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository code to the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11 environment with dependency caching
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs by caching pip packages

      # Step 3: Install Black and Ruff
      - name: Install Linting & Formatting Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install black ruff

      # Step 4: Verify code formatting with Black
      - name: Run Black Formatter Check
        run: black --check .

      # Step 5: Run static code analysis with Ruff
      - name: Run Ruff Linter
        run: ruff check .

  test:
    name: Run Type Check & Pytest
    runs-on: ubuntu-latest
    needs: lint # Only run tests if linting succeeds to save runner time
    steps:
      # Step 1: Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment with dependency caching
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Step 3: Install project requirements and MyPy
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install mypy

      # Step 4: Run MyPy Type Checker
      - name: Run MyPy Type Checker
        run: mypy .

      # Step 5: Run pytest tests
      - name: Run Tests
        env:
          # Provide the required SECRET_KEY environment variable for app Settings validation.
          # The tests use an in-memory SQLite database, so no external DB service container is required.
          SECRET_KEY: "ci-dummy-secret-key-for-running-tests"
        run: |
          python -m pytest

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test # Only build Docker image if tests pass
    steps:
      # Step 1: Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx for advanced build capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Test build the Docker image (PR validation)
      # We do not push to a registry on pull requests, only verify compilation.
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # Do not push on PR, just verify build
          tags: task-management:latest
          cache-from: type=gha # Use GitHub Actions Cache to speed up builds
          cache-to: type=gha,mode=max
