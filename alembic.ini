# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# sys.path path, prepend the current directory so modules can be imported
prepend_sys_path = .

# version_path_separator is used to support multi-directory version paths
version_path_separator = os

# We will load the database URL dynamically in env.py from the settings module
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/task_db

[post_write_hooks]
# post_write_hooks allow running formatters like black or ruff after a revision is generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
